<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/><title>SpanishWise</title><meta name="description" content="Advanced Spanish grammar wiki and C1/C2 vocabulary trainer."/><meta name="theme-color" content="#7c2d12"/><link rel="icon" href="icon.svg" type="image/svg+xml"/><link rel="manifest" href="manifest.json"/><link rel="stylesheet" href="./style-v1.css?v=1"/></head><body><main class="app-shell"><header class="hero"><section><p class="eyebrow">C1/C2 Spanish · grammar wiki · word of the day</p><h1>SpanishWise</h1><p class="subtitle">Advanced vocabulary, practical grammar notes, mini quizzes and saved study items. Built as a clean offline-friendly learning notebook.</p></section><button id="themeToggle" class="theme-toggle" type="button">Dark Mode</button></header><section class="tabs"><button class="tab-button active" data-tab="today" type="button">Today</button><button class="tab-button" data-tab="words" type="button">Words</button><button class="tab-button" data-tab="grammar" type="button">Grammar</button><button class="tab-button" data-tab="quiz" type="button">Quiz</button><button class="tab-button" data-tab="saved" type="button">Saved</button></section><section id="todayTab" class="tab-panel"><div id="todayCard" class="today-card"></div></section><section id="wordsTab" class="tab-panel" hidden><div class="toolbar"><input id="wordSearch" type="search" placeholder="Search words, meanings, examples..."/><select id="wordCategory"><option value="all">All categories</option></select><select id="wordLevel"><option value="all">All levels</option><option>C1</option><option>C2</option></select></div><div id="wordGrid" class="word-grid"></div></section><section id="grammarTab" class="tab-panel" hidden><div class="toolbar two"><input id="grammarSearch" type="search" placeholder="Search grammar topics..."/><select id="grammarCategory"><option value="all">All grammar categories</option></select></div><div id="grammarList" class="grammar-list"></div></section><section id="quizTab" class="tab-panel" hidden><article class="quiz-card"><div class="card-title"><strong>Mini Quiz</strong><span id="quizProgress">Question 1</span></div><div id="quizBox"></div></article></section><section id="savedTab" class="tab-panel" hidden><div class="saved-layout"><section><h2>Saved words</h2><div id="savedWords" class="stack-list"></div></section><section><h2>Saved grammar</h2><div id="savedGrammar" class="stack-list"></div></section></div></section></main><script src="./app-v1.js?v=1"></script></body></html>
